onboarding = false

[ui]
agent_panel_sort = "spaces"

[keys]
prefix          = "alt+q"
focus_pane_left = "prefix+left"
focus_pane_down = "prefix+down"
focus_pane_up = "prefix+up"
focus_pane_right = "prefix+right"

swap_pane_left   = "prefix+shift+left"
swap_pane_down   = "prefix+shift+down"
swap_pane_up     = "prefix+shift+up"
swap_pane_right  = "prefix+shift+right"

resize_mode     = "prefix+r"

workspace_picker = "prefix+w"
switch_workspace = "prefix+shift+1..9"

[[keys.command]]              # open in a split beside your work
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"

[[keys.command]]              # …or in its own tab
key = "prefix+shift+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer"

[[keys.command]]
key = "prefix+t"
type = "plugin_action"
command = "persiyanov.reviewr.toggle"   # <plugin_id>.<action_id> — note the id, not the name

[theme]
name = "nord"
auto_switch = false
