[tools]
neovim = "latest"
"github:kovidgoyal/kitty" = "latest"

# LazyVim core search/navigation dependencies
ripgrep = "latest"
fd = "latest"
fzf = "latest"

# LazyVim formatters & linters
stylua = "latest"
shellcheck = "latest"
shfmt = "latest"

# Developer language runtimes (that LazyVim/Mason LSPs rely on)
node = "20"
python = "3.11"
rust = "latest"
zellij = "latest"

[env]
EDITOR = "nvim"
TERMINAL = "kitty"
